replicaCount: 1

image:
  repository: 703697786238.dkr.ecr.eu-central-1.amazonaws.com/inference-api
  tag: latest
  pullPolicy: IfNotPresent


env:
  MLFLOW_TRACKING_URI: http://mlflow.mlflow.svc.cluster.local:5000
  MODEL_NAME: iris_rf_model
  MODEL_STAGE: Production

service:
  name: inference-api
  type: ClusterIP
  port: 4545
  targetPort: 8080
  
livenessProbe:
  httpGet:
    path: /docs
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /docs
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
